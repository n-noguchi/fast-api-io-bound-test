services:
  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: iob-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  # MinIO 起動後にバケット data を作成するワンショット
  minio-init:
    image: minio/mc:RELEASE.2024-10-02T08-27-28Z
    container_name: iob-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/data &&
      echo 'bucket data ready'
      "

  # Apache Spark 3.5.3 で 1GB parquet を生成して MinIO へアップロード(明示起動のみ)
  datagen:
    build: ./datagen
    image: iob-datagen
    container_name: iob-datagen
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: data
      NUM_ROWS: "${NUM_ROWS:-100000000}"
      TENANT_MAX: "1000"
    profiles: ["datagen"]

  # API1b: FastAPI + DataFusion
  api1b:
    build: ./api1b
    image: iob-api1b
    container_name: iob-api1b
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: data
      PARQUET_KEY: events.parquet
      DF_TARGET_PARTITIONS: "${DF_TARGET_PARTITIONS:-4}"
      DF_METADATA_CACHE: "${DF_METADATA_CACHE:-1}"
    ports:
      - "18001:8000"

  k6df:
    image: grafana/k6:0.54.0
    container_name: iob-k6df
    volumes:
      - ./k6:/scripts
    entrypoint: ["k6"]
    depends_on:
      - api1b
    profiles: ["test"]

volumes:
  minio-data:

networks:
  default:
    name: iob-df-net
